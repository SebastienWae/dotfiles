TIMING:
  TAP_MILLISEC: 200
  DOUBLE_TAP_MILLISEC: 0

MAPPINGS:
  - KEY: KEY_CAPSLOCK
    TAP: KEY_ESC
    HOLD: KEY_LEFTCTRL
    HOLD_START: BEFORE_CONSUME_OR_RELEASE
  - KEY: KEY_ESC
    TAP: KEY_GRAVE
    HOLD: KEY_CAPSLOCK
    HOLD_START: BEFORE_CONSUME_OR_RELEASE
  - KEY: KEY_LEFTCTRL
    TAP: [ KEY_LEFTCTRL, KEY_LEFTMETA, KEY_LEFTALT, KEY_HOME ]
    HOLD: [ KEY_LEFTCTRL, KEY_LEFTMETA, KEY_LEFTALT, ]
    HOLD_START: BEFORE_CONSUME_OR_RELEASE
  - KEY: KEY_RIGHTCTRL
    TAP: [ KEY_LEFTCTRL, KEY_LEFTMETA, KEY_LEFTALT, KEY_PAGEUP ]
    HOLD: KEY_RIGHTCTRL
    HOLD_START: BEFORE_CONSUME_OR_RELEASE
